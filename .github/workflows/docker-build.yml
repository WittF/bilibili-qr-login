name: Docker Build and Push

on:
  repository_dispatch:
    types: [semantic-release]

env:
  REGISTRY: docker.io
  IMAGE_NAME: bilibili-qr-login

jobs:
  # 准备构建信息
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🚀 正式版本发布: v$VERSION"

  # 构建和发布Docker镜像
  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      TRUST_ORIGIN: ${{ secrets.TRUST_ORIGIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        run: |
          echo "🔍 检查Docker构建环境..."
          echo "📦 版本: ${{ needs.prepare.outputs.version }}"
          if [[ -n "${{ env.DOCKER_USERNAME }}" ]]; then
            echo "✅ Docker用户名已配置: ${{ env.DOCKER_USERNAME }}"
          else
            echo "❌ Docker用户名未配置"
          fi
          
          if [[ -n "${{ env.DOCKER_PASSWORD }}" ]]; then
            echo "✅ Docker密码已配置"
          else
            echo "❌ Docker密码未配置"
          fi

      - name: Check required build configuration
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        run: |
          if [[ -z "$TRUST_ORIGIN" ]]; then
            echo "❌ TRUST_ORIGIN 未配置，拒绝构建未启用 postMessage 白名单的前端包"
            exit 1
          fi

          echo "✅ TRUST_ORIGIN 已配置"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,priority=900
            type=raw,value=v${{ needs.prepare.outputs.version }},priority=800
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=哔哩哔哩登录工具
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to Docker Hub
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TRUST_ORIGIN=${{ env.TRUST_ORIGIN }}
            APP_VERSION=${{ needs.prepare.outputs.version }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
          repository: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Verify published image
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v${{ needs.prepare.outputs.version }}"
          echo "🧪 验证发布的镜像: $IMAGE"

          # 等待镜像传播
          sleep 10

          for i in 1 2 3; do
            if docker pull "$IMAGE"; then
              echo "✅ 镜像验证成功"
              exit 0
            fi

            if [[ "$i" == "3" ]]; then
              echo "❌ 镜像拉取失败: $IMAGE"
              exit 1
            fi

            echo "镜像可能仍在传播，重试 $i/3..."
            sleep 10
          done

      - name: Smoke test published image
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v${{ needs.prepare.outputs.version }}"
          echo "🧪 启动镜像冒烟测试: $IMAGE"

          CONTAINER_ID=$(docker run -d \
            -e PORT=3000 \
            -e NODE_ENV=production \
            -e TRUST_ORIGIN="${{ env.TRUST_ORIGIN }}" \
            -e https_proxy=http://127.0.0.1:9 \
            "$IMAGE")
          trap 'docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT

          sleep 5
          docker logs "$CONTAINER_ID"

          if ! docker ps -q --filter "id=$CONTAINER_ID" | grep -q .; then
            echo "❌ 镜像启动后已退出"
            docker inspect "$CONTAINER_ID" --format='exit={{.State.ExitCode}} error={{.State.Error}}'
            exit 1
          fi

          echo "✅ 镜像启动冒烟测试通过"

      - name: Set up kubectl
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        uses: azure/setup-kubectl@v4

      - name: Deploy to k8s (rolling update)
        if: env.DOCKER_PASSWORD != '' && env.DOCKER_USERNAME != ''
        env:
          KUBE_CONFIG_WITTF: ${{ secrets.KUBE_CONFIG_WITTF }}
        run: |
          if [[ -z "$KUBE_CONFIG_WITTF" ]]; then
            echo "⚠️ KUBE_CONFIG_WITTF 未配置，跳过 k8s 部署"
            exit 0
          fi

          KUBECONFIG_FILE="$RUNNER_TEMP/kubeconfig"
          trap 'rm -f "$KUBECONFIG_FILE"' EXIT
          printf '%s' "$KUBE_CONFIG_WITTF" > "$KUBECONFIG_FILE"
          chmod 600 "$KUBECONFIG_FILE"
          export KUBECONFIG="$KUBECONFIG_FILE"

          IMAGE="${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v${{ needs.prepare.outputs.version }}"

          echo "🚀 触发 k8s 滚动更新: $IMAGE"
          kubectl -n wittf set image deployment/biliqrlogin app="$IMAGE"
          kubectl -n wittf rollout status deployment/biliqrlogin --timeout=180s
          echo "✅ k8s 滚动更新完成"
          echo "🎉 版本 v${{ needs.prepare.outputs.version }} 发布完成"
